<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Repair Services</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 0; color: #333; }
        header { background: #2c3e50; color: white; padding: 2rem; text-align: center; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .services { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .photo-gallery { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .photo-gallery img { width: 45%; border-radius: 8px; }
        .contact { background: #f4f4f4; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .btn { display: inline-block; background: #e74c3c; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <h1>Fast Laptop Repair Service</h1>
        <p>Expert Solutions for All Brands</p>
    </header>
    <div class="container">
        <h2>Our Services</h2>
        <div class="services">
            <div>• Screen Replacement<br>• Battery Fixes</div>
            <div>• Software/Virus Removal<br>• Water Damage Repair</div>
        </div>

        <h2>Gallery</h2>
        <div class="photo-gallery">
            <img src="repair1.jpg" alt="Repair 1">
            <img src="repair2.jpg" alt="Repair 2">
        </div>

        <div class="contact">
            <h2>Contact Us</h2>
            <p>📍 Location: 123 Repair St, City Name</p>
            <p>📞 Phone: <a href="tel:+123456789">Call Us Now</a></p>
            <a href="mailto:info@yourdomain.com" class="btn">Email Us</a>
        </div>
    </div>
</body>
</html>
